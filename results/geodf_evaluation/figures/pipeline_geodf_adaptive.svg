   </g>
   <g id="text_12">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="50.8995" y="202.184272" transform="rotate(-0 50.8995 202.184272)">(b)</text>
   </g>
   <g id="text_13">
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 197.83011)">Temporal 2D-F on left cam (RANSAC) + Sampson residual e_i</text>
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 206.152121)">(support / fallback; also gates 3D activation)</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="50.8995" y="232.237255" transform="rotate(-0 50.8995 232.237255)">(c)</text>
   </g>
   <g id="text_15">
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'; text-anchor: start" x="86.175" y="232.044099" transform="rotate(-0 86.175 232.044099)">Stereo: KLT cur left→right; triangulate prev stereo (L/R at t−1)</text>
   </g>
   <g id="text_16">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="50.8995" y="262.290238" transform="rotate(-0 50.8995 262.290238)">(d)</text>
   </g>
   <g id="text_17">
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 257.831779)">Primary gate: PnP-RANSAC rigid motion → 3D reprojection r_i</text>
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 266.153791)">Dynamic candidate if r_i &gt; τ_3D  (else 2D dual-gate fallback)</text>
   </g>
   <g id="text_18">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="50.8995" y="292.343221" transform="rotate(-0 50.8995 292.343221)">(e)</text>
   </g>
   <g id="text_19">
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 287.884762)">Scene-aware ARM: EMA(outlier ratio) ≥ ρ_on(auto) AND quality gate</text>
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 296.206774)">(ρ_on = clamp(floor·1.8 + 0.10, 0.14, 0.40); hysteresis disarm)</text>
   </g>
   <g id="text_20">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="50.8995" y="322.396204" transform="rotate(-0 50.8995 322.396204)">(f)</text>
   </g>
   <g id="text_21">
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 318.146339)">Temporal voting: flag ≥ k=3 consecutive frames (warmup 60)</text>
    <text style="font-size: 7.5px; font-family: 'DejaVu Sans'" transform="translate(86.175 326.259757)">Ratio guard: reject ≤ 40% tracks, cap 5 deletions / frame</text>
   </g>
   <g id="text_22">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="50.8995" y="352.412672" transform="rotate(-0 50.8995 352.412672)">(g)</text>
