   <g id="text_1">
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(27.320872 47.915816)">Stereo frames</text>
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(29.377919 57.409559)">(t-1, t) + IMU</text>
   </g>
   <g id="text_2">
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(134.546819 47.915816)">KLT tracking</text>
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(138.972897 57.409559)">(fwd-bwd)</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(225.431063 47.915816)">GeoDF-Adaptive</text>
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(237.371672 57.409559)">(proposed)</text>
   </g>
   <g id="text_4">
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(331.913244 47.915816)">Feature masking</text>
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(342.198478 57.409559)">&amp; detection</text>
   </g>
   <g id="text_5">
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(450.16755 47.915816)">Back-end</text>
    <text style="font-size: 8.2px; font-family: 'DejaVu Sans'" transform="translate(443.236628 57.409559)">(unchanged)</text>
   </g>
   <g id="text_6">
    <text style="font-style: italic; font-size: 8px; font-family: 'DejaVu Sans'; text-anchor: middle" x="262.8" y="349.8235" transform="rotate(-0 262.8 349.8235)">Only the highlighted module is added; the stereo-inertial back-end is unmodified.</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 9.3px; font-family: 'DejaVu Sans'; text-anchor: start" x="53.208" y="134.145891" transform="rotate(-0 53.208 134.145891)">GeoDF-Adaptive  (geometry-only, training-free, front-end module)</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start" x="68.544" y="166.01225" transform="rotate(-0 68.544 166.01225)">(a)</text>
   </g>
   <g id="text_9">
    <text style="font-size: 8px; font-family: 'DejaVu Sans'; text-anchor: start" x="104.328" y="165.7915" transform="rotate(-0 104.328 165.7915)">Lift tracks to the normalized plane and map to pseudo-pixels</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start" x="68.544" y="195.38825" transform="rotate(-0 68.544 195.38825)">(b)</text>
   </g>
   <g id="text_11">
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 190.577125)">Estimate temporal fundamental matrix F (RANSAC);</text>
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 199.535375)">score the Sampson residual  e_i</text>
   </g>
   <g id="text_12">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start" x="68.544" y="224.76425" transform="rotate(-0 68.544 224.76425)">(c)</text>
   </g>
   <g id="text_13">
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 219.953125)">Dual gate: dynamic candidate iff (RANSAC outlier)</text>
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 228.911375)">AND  (e_i &gt; τ)</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start" x="68.544" y="254.14025" transform="rotate(-0 68.544 254.14025)">(d)</text>
   </g>
   <g id="text_15">
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 249.329125)">Scene-aware activation: arm only when EMA of outlier ratio</text>
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 258.287375)">≥ ρ_on = clamp(floor·1.8 + 0.05, 0.10, 0.40)</text>
   </g>
   <g id="text_16">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start" x="68.544" y="283.51625" transform="rotate(-0 68.544 283.51625)">(e)</text>
   </g>
   <g id="text_17">
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 278.816375)">Track-level temporal voting (k = 2, 30-frame warm-up)</text>
    <text style="font-size: 8px; font-family: 'DejaVu Sans'" transform="translate(104.328 287.774625)">+ ratio guard ≤ 40% of features per frame</text>
   </g>
   <g id="text_18">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start" x="68.544" y="312.89225" transform="rotate(-0 68.544 312.89225)">(f)</text>
   </g>
   <g id="text_19">
    <text style="font-size: 8px; font-family: 'DejaVu Sans'; text-anchor: start" x="104.328" y="312.6715" transform="rotate(-0 104.328 312.6715)">Hard-delete confirmed dynamic tracks; keep the rest</text>
   </g>
  </g>
 </g>
